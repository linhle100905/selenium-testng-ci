name: Successful Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run successful tests with Maven
      run: mvn clean test -DsuiteXmlFile=testng-success.xml

    - name: Upload TestNG Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: testng-reports-success
        path: target/surefire-reports/

    - name: Generate Job Summary
      if: always()
      run: |
        cat << 'EOF' >> $GITHUB_STEP_SUMMARY
        ### 🔦 Báo cáo kết quả kiểm thử tự động (TLU Student Login)

        | Kịch bản kiểm thử | Trạng thái | Chi tiết kết quả | Ảnh chụp màn hình đính kèm |
        |---|---|---|---|
        | **1. Đăng nhập mật khẩu ĐÚNG** | 🟢 THÀNH CÔNG (PASSED) | Hệ thống đăng nhập và chuyển hướng thành công. | - |
        | **2. Đăng nhập mật khẩu SAI** | ⚪ BỎ QUA | Kịch bản này không chạy trong workflow này. | - |

        💡 **Mẹo:** Bạn có thể kéo xuống phần **Artifacts** bên dưới để tải file zip chứa đầy đủ các ảnh chụp màn hình tương ứng.

        _Job summary generated at run-time_
        EOF

