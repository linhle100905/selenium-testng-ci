name: Successful Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run successful tests with Maven
      run: mvn clean test -DsuiteXmlFile=testng-success.xml

    - name: Upload TestNG Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: testng-reports-success
        path: target/surefire-reports/

    - name: Publish Test Summary to GitHub Actions Summary Page
      uses: test-summary/action@v2
      with:
        paths: "target/surefire-reports/junitreports/TEST-*.xml"
      if: always()
